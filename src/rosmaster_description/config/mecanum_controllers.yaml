controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    front_left_wheel_command_joint_name:  front_left_wheel_joint
    front_right_wheel_command_joint_name: front_right_wheel_joint
    rear_left_wheel_command_joint_name:   rear_left_wheel_joint
    rear_right_wheel_command_joint_name:  rear_right_wheel_joint

    front_left_wheel_state_joint_name:  front_left_wheel_joint
    front_right_wheel_state_joint_name: front_right_wheel_joint
    rear_left_wheel_state_joint_name:   rear_left_wheel_joint
    rear_right_wheel_state_joint_name:  rear_right_wheel_joint

    kinematics:
      wheels_radius: 0.048
      # sum = (wheel_separation_x + wheel_separation_y) / 2
      # = (0.265 + 0.190) / 2 = 0.2275
      sum_of_robot_center_projection_on_X_Y_axis: 0.2275

    # TF de odometria: odom -> base_footprint -> base_link (via RSP)
    # base_footprint es el root del URDF; base_link es su hijo fixed.
    # Publicar odom->base_link dejaría base_footprint huerfano en el TF tree.
    enable_odom_tf: true
    odom_frame_id: odom
    base_frame_id: base_footprint

    publish_rate: 50.0
    use_sim_time: true
